<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Todo App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="todo-app">
        <h1>Todo List</h1>
        <form id="task-form">
            <input type="text" id="new-task" placeholder="What needs to be done?" autocomplete="off" required>
            <button type="submit">Add</button>
        </form>
        <ul id="task-list" class="task-list"></ul>
        <div class="filters">
            <button data-filter="all" class="filter-btn active">All</button>
            <button data-filter="active" class="filter-btn">Active</button>
            <button data-filter="completed" class="filter-btn">Completed</button>
        </div>
    </div>
    <footer>
        <!-- Future footer content -->
    </footer>
    <script src="app.js" defer></script>
</body>
</html>
