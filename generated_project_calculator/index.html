<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCalc</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="calculator" class="calculator" role="application" aria-label="Web Calculator">
        <div id="display" class="display" aria-live="polite" aria-atomic="true">0</div>
        <div class="buttons">
            <!-- Row 1: AC, C, /, * -->
            <button type="button" class="btn" data-key="AC" aria-label="All Clear">AC</button>
            <button type="button" class="btn" data-key="C" aria-label="Clear">C</button>
            <button type="button" class="btn" data-key="/" aria-label="Divide">÷</button>
            <button type="button" class="btn" data-key="*" aria-label="Multiply">×</button>

            <!-- Row 2: 7, 8, 9, - -->
            <button type="button" class="btn" data-key="7" aria-label="Seven">7</button>
            <button type="button" class="btn" data-key="8" aria-label="Eight">8</button>
            <button type="button" class="btn" data-key="9" aria-label="Nine">9</button>
            <button type="button" class="btn" data-key="-" aria-label="Subtract">‑</button>

            <!-- Row 3: 4, 5, 6, + -->
            <button type="button" class="btn" data-key="4" aria-label="Four">4</button>
            <button type="button" class="btn" data-key="5" aria-label="Five">5</button>
            <button type="button" class="btn" data-key="6" aria-label="Six">6</button>
            <button type="button" class="btn" data-key="+" aria-label="Add">+</button>

            <!-- Row 4: 1, 2, 3, = -->
            <button type="button" class="btn" data-key="1" aria-label="One">1</button>
            <button type="button" class="btn" data-key="2" aria-label="Two">2</button>
            <button type="button" class="btn" data-key="3" aria-label="Three">3</button>
            <button type="button" class="btn" data-key="Enter" aria-label="Equals">=</button>

            <!-- Row 5: 0, ., (optional) -->
            <button type="button" class="btn" data-key="0" aria-label="Zero">0</button>
            <button type="button" class="btn" data-key="." aria-label="Decimal point">.</button>
        </div>
    </div>
</body>
</html>
