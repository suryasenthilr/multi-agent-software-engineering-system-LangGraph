<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>CGPA Calculator</h1>
    </header>
    <main>
        <form id="cgpa-form">
            <table id="courses-table">
                <thead>
                    <tr>
                        <th>Course Name</th>
                        <th>Grade</th>
                        <th>Credit Hours</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="course-row">
                        <td><input type="text" class="course-name" placeholder="Course Name" required></td>
                        <td>
                            <select class="course-grade" required>
                                <option value="" disabled selected>Select Grade</option>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                                <option value="F">F</option>
                            </select>
                        </td>
                        <td><input type="number" class="course-credits" placeholder="Credits" min="0" step="0.5" required></td>
                        <td><button type="button" class="remove-row" aria-label="Remove row" disabled>✖</button></td>
                    </tr>
                </tbody>
            </table>
            <button type="button" id="add-row">Add Course</button>
            <div id="error-messages" class="error-messages"></div>
            <div id="result" class="result hidden">Your CGPA: <span id="cgpa-value"></span></div>
            <button type="button" id="calculate">Calculate CGPA</button>
            <button type="reset" id="reset">Reset</button>
        </form>
    </main>
</body>
</html>
