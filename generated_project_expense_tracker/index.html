<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Expense Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <h1>Expense Calculator</h1>
        <form id="expense-form">
            <input type="text" id="expense-name" placeholder="Expense name" required>
            <input type="number" id="expense-amount" placeholder="Amount" min="0" step="0.01" required>
            <button type="submit" id="add-expense-btn">Add Expense</button>
        </form>
        <table id="expenses-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="expenses-tbody"></tbody>
        </table>
        <div class="total">Total: $<span id="total-amount">0.00</span></div>
        <button id="reset-btn">Reset All</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
